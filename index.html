<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לוח מחלקה — יולדות ב׳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f5f5f7; --surface:#ffffff; --surface-2:#fbfbfd;
    --ink:#1d1d1f; --ink2:#6e6e73; --ink3:#a1a1a6; --line:#e7e7ec; --line-2:#dededf;
    --accent:#0071e3; --accent-press:#0062c4;
    --red:#ff3b30; --red-bg:#fdeceb; --red-tint:#fff6f5;
    --orange:#ff9500; --orange-bg:#fef1df; --orange-tint:#fffaf2;
    --green:#30a46c; --green-bg:#e7f6ee; --green-tint:#f4fbf7;
    --r-card:18px; --r-ctl:12px;
    --sh-sm:0 1px 2px rgba(0,0,0,.05);
    --sh-md:0 6px 20px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04);
    --sh-lg:0 16px 40px rgba(0,0,0,.14);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{background:var(--bg); color:var(--ink); font-family:"Heebo",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; font-size:16px; line-height:1.5; letter-spacing:-.01em; -webkit-font-smoothing:antialiased; padding-bottom:40px}
  button{font-family:inherit; cursor:pointer; color:inherit}
  svg{display:block}
  .hidden{display:none !important}
  .ic{width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; flex:none}

  header{position:sticky; top:0; z-index:60; background:rgba(255,255,255,.78); backdrop-filter:saturate(180%) blur(20px); -webkit-backdrop-filter:saturate(180%) blur(20px); border-bottom:1px solid var(--line); padding:11px 18px; display:flex; align-items:center; gap:12px}
  header .logo{width:38px; height:38px; border-radius:11px; background:linear-gradient(160deg,#0a84ff,#0060c4); display:flex; align-items:center; justify-content:center; box-shadow:0 4px 12px rgba(0,113,227,.3)}
  header .logo svg{width:21px; height:21px; stroke:#fff; fill:none; stroke-width:1.8}
  header .title{font-size:18px; font-weight:600; letter-spacing:-.02em; line-height:1.15}
  header .sub{font-size:12px; color:var(--ink3); margin-top:1px}
  .spacer{flex:1}
  .idchip{display:flex; align-items:center; gap:7px; background:var(--bg); border:1px solid var(--line); border-radius:999px; padding:8px 13px; font-size:14px; font-weight:600; color:var(--ink)}
  .idchip .ic{color:var(--accent)}

  .idgate{position:fixed; inset:0; z-index:300; display:flex; align-items:center; justify-content:center; background:var(--bg); padding:22px}
  .idgate .idbox{background:var(--surface); border:1px solid var(--line); border-radius:26px; padding:36px 30px; width:min(94vw,400px); box-shadow:var(--sh-md); text-align:center}
  .idgate .mark{width:58px; height:58px; border-radius:17px; margin:0 auto 16px; background:linear-gradient(160deg,#0a84ff,#0060c4); display:flex; align-items:center; justify-content:center; box-shadow:0 8px 22px rgba(0,113,227,.35)}
  .idgate .mark svg{width:30px; height:30px; stroke:#fff; fill:none}
  .idgate h1{font-size:24px; font-weight:700; margin:0 0 3px; letter-spacing:-.02em}
  .idgate p{color:var(--ink2); margin:0 0 22px; font-size:15px}
  .idroles{display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:14px}
  .idroles button{border:1.5px solid var(--line-2); background:var(--surface); border-radius:13px; padding:13px 8px; font-size:15px; font-weight:600; color:var(--ink); transition:.12s}
  .idroles button.on{border-color:var(--accent); background:#f3f8ff; box-shadow:0 0 0 3px rgba(0,113,227,.12); color:var(--accent)}
  .idgate input{width:100%; border:1.5px solid var(--line-2); border-radius:13px; padding:14px; font-size:17px; text-align:center; background:var(--surface-2)}
  .idgate input:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 4px rgba(0,113,227,.12)}
  .iderr{color:var(--red); min-height:20px; font-size:13px; margin-top:9px}

  main{max-width:920px; margin:0 auto; padding:16px}
  .toolbar{display:flex; gap:9px; flex-wrap:wrap; margin-bottom:14px; align-items:center}
  .btn{border:1px solid var(--line-2); background:var(--surface); border-radius:12px; padding:11px 15px; font-size:15px; font-weight:600; color:var(--ink); display:inline-flex; align-items:center; gap:8px; transition:.15s; box-shadow:var(--sh-sm)}
  .btn:active{transform:scale(.98)}
  .btn .ic{width:19px; height:19px}
  .btn.primary{background:var(--accent); color:#fff; border-color:transparent; box-shadow:0 4px 14px rgba(0,113,227,.26)}
  .btn.ghost{background:transparent; box-shadow:none; color:var(--ink2)}
  .grow{flex:1}
  .synced{font-size:12px; color:var(--ink3)}

  .tablewrap{background:var(--surface); border:1px solid var(--line); border-radius:var(--r-card); box-shadow:var(--sh-md); overflow:hidden}
  .scroll{overflow-x:auto}
  table{width:100%; border-collapse:collapse; font-size:14.5px; min-width:660px}
  thead th{position:sticky; top:0; background:var(--surface-2); font-weight:600; color:var(--ink2); font-size:12.5px; padding:11px 6px; border-bottom:1px solid var(--line); text-align:center; line-height:1.25}
  thead th.name{text-align:right; padding-inline-start:14px}
  tbody td{padding:10px 6px; border-bottom:1px solid var(--line); text-align:center; vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  td.room{font-weight:700; font-size:16px; width:46px}
  td.name{text-align:right; padding-inline-start:14px; font-weight:600; font-size:15.5px}
  td.name .diet{font-size:12px; color:var(--ink3); font-weight:400; margin-top:1px}

  tr.r-unsigned td{background:var(--red-tint)}
  tr.r-intern td{background:var(--orange-tint)}
  tr.r-ready td{background:var(--green-tint)}

  .chk{width:30px; height:30px; border-radius:50%; border:1.5px solid var(--line-2); background:var(--surface); display:inline-flex; align-items:center; justify-content:center; color:var(--ink3); transition:.12s}
  .chk .ic{width:18px; height:18px; stroke-width:2.4; opacity:0}
  .chk.on .ic{opacity:1}
  .chk.on.unsigned{background:var(--red); border-color:var(--red); color:#fff}
  .chk.on.intern{background:var(--orange); border-color:var(--orange); color:#fff}
  .chk.on.ready{background:var(--green); border-color:var(--green); color:#fff}

  .reqbtn{border:none; background:transparent; padding:6px; display:inline-flex; align-items:center; justify-content:center; gap:5px; border-radius:10px; color:var(--ink3); font-weight:600; font-size:14px}
  .reqbtn .badge{display:inline-flex; align-items:center; gap:4px; background:var(--bg-accent,#e6f1fb); color:var(--accent); border-radius:999px; padding:3px 9px; font-weight:600}
  .reqbtn .badge.has{background:var(--accent); color:#fff}
  .reqbtn .ic{width:18px; height:18px}
  .rm{border:none; background:transparent; color:var(--ink3); padding:6px; border-radius:8px}
  .rm:hover{color:var(--red)}

  .detail td{background:var(--surface-2); padding:0; text-align:right}
  .detail .inner{padding:13px 16px; display:flex; flex-direction:column; gap:9px}
  .detail .dh{font-size:12.5px; color:var(--ink2); font-weight:600}
  .reqcard{display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:10px 12px}
  .reqcard .tic{width:32px; height:32px; border-radius:9px; background:var(--bg); display:flex; align-items:center; justify-content:center; color:var(--accent); flex:none}
  .reqcard .tic .ic{width:19px; height:19px}
  .reqcard .body{flex:1; min-width:0}
  .reqcard .ty{font-weight:600; font-size:15px}
  .reqcard .de{font-size:13px; color:var(--ink2); margin-top:1px}
  .reqcard .mt{font-size:11.5px; color:var(--ink3); margin-top:2px}
  .pill{border-radius:999px; padding:3px 10px; font-size:12px; font-weight:600; white-space:nowrap}
  .pill.s-new{background:var(--red-bg); color:var(--red)}
  .pill.s-progress{background:var(--orange-bg); color:#b06900}
  .pill.s-done{background:var(--green-bg); color:var(--green)}
  .pill.urgent{background:var(--red); color:#fff}
  .ract{display:flex; gap:7px; flex-wrap:wrap; margin-top:2px}
  .mini{border:none; border-radius:9px; padding:8px 12px; font-size:13px; font-weight:600; display:inline-flex; align-items:center; gap:5px}
  .mini .ic{width:15px; height:15px; stroke-width:2.4}
  .mini.take{background:var(--accent); color:#fff}
  .mini.done{background:var(--green); color:#fff}
  .mini.reopen{background:var(--bg); color:var(--ink2); border:1px solid var(--line-2)}
  .mini.cancel{background:transparent; color:var(--red)}
  .addreq{align-self:flex-start; background:var(--surface); border:1px dashed var(--line-2); color:var(--accent); border-radius:11px; padding:10px 14px; font-weight:600; font-size:14px; display:inline-flex; align-items:center; gap:7px}

  .empty{text-align:center; color:var(--ink2); padding:50px 24px}
  .empty .eic{width:50px; height:50px; border-radius:15px; background:var(--bg); display:flex; align-items:center; justify-content:center; margin:0 auto 13px; color:var(--ink3)}

  .overlay{position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.32); backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px); display:flex; align-items:flex-end; justify-content:center; animation:fade .2s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .sheet{background:var(--bg); width:100%; max-width:560px; max-height:94vh; overflow:auto; border-radius:24px 24px 0 0; padding:10px 20px 26px; box-shadow:var(--sh-lg); animation:rise .28s cubic-bezier(.2,.8,.2,1)}
  @keyframes rise{from{transform:translateY(40px)}to{transform:translateY(0)}}
  .grab{width:38px; height:5px; border-radius:3px; background:var(--line-2); margin:8px auto 12px}
  .sheet h2{font-size:22px; font-weight:700; margin:0 0 2px; letter-spacing:-.02em}
  .sheet .for{font-size:14px; color:var(--ink2); margin-bottom:6px}
  .step{font-size:13px; font-weight:600; color:var(--ink3); margin:20px 0 10px}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px}
  .opt{display:flex; align-items:center; gap:11px; border:1.5px solid var(--line-2); background:var(--surface); border-radius:14px; padding:13px 14px; font-size:15px; font-weight:600; color:var(--ink); transition:.15s; text-align:right}
  .opt .oic{width:36px; height:36px; border-radius:10px; background:var(--bg); display:flex; align-items:center; justify-content:center; color:var(--accent); flex:none}
  .opt .oic .ic{width:20px; height:20px}
  .opt.on{border-color:var(--accent); background:#f3f8ff; box-shadow:0 0 0 3px rgba(0,113,227,.12)}
  .urg{display:flex; gap:10px}
  .urg .opt{flex:1; justify-content:center}
  .urg .opt.on.urgent{border-color:var(--red); background:var(--red-bg); box-shadow:0 0 0 3px rgba(255,59,48,.12); color:var(--red)}
  textarea,.text-in{width:100%; border:1.5px solid var(--line-2); border-radius:14px; padding:13px 15px; font-size:16px; font-family:inherit; background:var(--surface); transition:.15s}
  textarea{min-height:74px; resize:vertical}
  textarea:focus,.text-in:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 4px rgba(0,113,227,.1)}
  .text-in{margin-top:9px}
  .sheet-acts{display:flex; gap:10px; margin-top:24px; position:sticky; bottom:0; background:linear-gradient(transparent,var(--bg) 24%); padding:14px 0 4px}
  .sheet-acts .btn{flex:1; justify-content:center; padding:15px}

  .toast{position:fixed; bottom:24px; left:50%; transform:translate(-50%,180%); background:rgba(29,29,31,.94); backdrop-filter:blur(10px); color:#fff; padding:13px 22px; border-radius:14px; font-size:15px; font-weight:600; z-index:400; transition:transform .35s cubic-bezier(.2,.9,.2,1); box-shadow:var(--sh-lg); max-width:90vw; text-align:center}
  .toast.show{transform:translate(-50%,0)}
  .banner{display:none; background:var(--orange-bg); color:#8a5200; border:1px solid #ffe2b3; border-radius:13px; padding:11px 14px; font-size:14px; margin-bottom:13px}
  .banner.show{display:block}
  .spin{width:20px; height:20px; border:2.5px solid rgba(0,0,0,.12); border-top-color:var(--accent); border-radius:50%; animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <div class="logo"><svg viewBox="0 0 24 24"><path d="M12 4v16M4 12h16" stroke-width="2.2"/></svg></div>
  <div>
    <div class="title">לוח מחלקה · יולדות ב׳</div>
    <div class="sub" id="dateLine"></div>
  </div>
  <div class="spacer"></div>
  <button class="idchip" id="idChip"><svg class="ic" viewBox="0 0 24 24" style="width:17px;height:17px"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg><span id="idChipName">זיהוי</span></button>
</header>

<div class="idgate" id="idgate">
  <div class="idbox">
    <div class="mark"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4" stroke-width="1.8"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6" stroke-width="1.8"/></svg></div>
    <h1>מי את/ה?</h1>
    <p>הזיהוי נרשם לצד כל בקשה</p>
    <div class="idroles" id="idRoles">
      <button data-role="אחות">אחות</button>
      <button data-role="מתמחה">מתמחה</button>
      <button data-role="רופא/ה בכיר/ה">רופא/ה בכיר/ה</button>
      <button data-role="מזכירות">מזכירות</button>
    </div>
    <input id="idName" placeholder="השם שלך" autocomplete="off">
    <button class="btn primary" id="idEnter" style="width:100%;justify-content:center;margin-top:12px">כניסה ללוח</button>
    <div class="iderr" id="idErr"></div>
  </div>
</div>

<main>
  <div class="banner" id="banner"></div>
  <div class="toolbar">
    <button class="btn primary" id="uploadBtn"><svg class="ic" viewBox="0 0 24 24"><path d="M4 8h3l2-2h6l2 2h3a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1z"/><circle cx="12" cy="13" r="3.5"/></svg> העלאת רשימת מאושפזות</button>
    <button class="btn" id="addPatBtn"><svg class="ic" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> מטופלת</button>
    <span class="grow"></span>
    <button class="btn ghost" id="newdayBtn"><svg class="ic" viewBox="0 0 24 24"><path d="M4 5h16M7 5V3M17 5V3M5 9h14v10a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1z"/></svg> יום חדש</button>
    <input type="file" id="file" accept="image/*" capture="environment" hidden>
  </div>

  <div class="tablewrap">
    <div class="scroll">
      <table>
        <thead><tr>
          <th>חדר</th>
          <th class="name">שם</th>
          <th>מועמדת<br>לשחרור</th>
          <th>נכתב ע״י<br>מתמחה</th>
          <th>חתומה</th>
          <th>בקשות<br>סיעוד</th>
        </tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <div class="empty hidden" id="empty"><div class="eic"><svg class="ic" viewBox="0 0 24 24" style="width:26px;height:26px"><path d="M3 7v12M3 13h15a3 3 0 0 1 3 3v3M21 19v-3"/><circle cx="8" cy="10.5" r="2.2"/></svg></div>אין מטופלות עדיין — העלה/י את רשימת המאושפזות כדי להתחיל</div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const ENDPOINT = "https://script.google.com/macros/s/AKfycbw58XPl_FVQtX_0WwPhh9jVygaaOir-Jig2IvdtxXGhchlobkCwOxAUj1Mm4EC3u8c-jg/exec";
const POLL_MS = 12000;
const $ = s => document.querySelector(s);

const ICONS = {
  'רישום תרופה':'<path d="M3 12a4 4 0 0 1 4-4h10a4 4 0 0 1 0 8H7a4 4 0 0 1-4-4z"/><path d="M12 8v8"/>',
  'בדיקת יולדת':'<path d="M3 12h3.5l2 5 4-11 2.5 6H21"/>',
  'בדיקת מעבדה':'<path d="M9 3h6M10 3v6l-5.2 8.6A2 2 0 0 0 6.5 21h11a2 2 0 0 0 1.7-3.4L14 9V3"/><path d="M7.5 15h9"/>',
  'צילום / הדמיה':'<path d="M4 8V6a2 2 0 0 1 2-2h2M16 4h2a2 2 0 0 1 2 2v2M20 16v2a2 2 0 0 1-2 2h-2M8 20H6a2 2 0 0 1-2-2v-2"/><path d="M4 12h16"/>',
  'ביטול תרופה':'<path d="M3 12a4 4 0 0 1 4-4h10a4 4 0 0 1 0 8H7a4 4 0 0 1-4-4z"/><path d="M7.5 8.5l9 7"/>',
  'אחר':'<circle cx="5.5" cy="12" r="1.4" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.4" fill="currentColor" stroke="none"/><circle cx="18.5" cy="12" r="1.4" fill="currentColor" stroke="none"/>'
};
const svgIcon = l => `<svg class="ic" viewBox="0 0 24 24">${ICONS[l]||ICONS['אחר']}</svg>`;
const TYPES = Object.keys(ICONS);
const CHECK = '<svg class="ic" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>';

const STAGES = [{k:'unsigned'},{k:'intern'},{k:'ready'}];
const stageIdx = d => STAGES.findIndex(s=>s.k===d);
const STATUS_HE = {new:'ממתין', progress:'בטיפול', done:'בוצע'};

let state = {patients:[], requests:[], log:[]};
let expandedId = null;

let me = JSON.parse(localStorage.getItem('me')||'null');
let idRole = me ? me.role : null;
const who = ()=> me ? (me.name+' · '+me.role) : 'לא מזוהה';
function updateChip(){ $('#idChipName').textContent = me ? me.name : 'זיהוי'; }
function showId(){ $('#idgate').style.display='flex'; $('#idErr').textContent=''; if(me){ $('#idName').value=me.name; } document.querySelectorAll('#idRoles button').forEach(b=>b.classList.toggle('on', b.dataset.role===idRole)); setTimeout(()=>$('#idName').focus(),50); }
function hideId(){ $('#idgate').style.display='none'; }
function doId(){ const n=$('#idName').value.trim(); if(!idRole){ $('#idErr').textContent='בחר/י תפקיד'; return; } if(!n){ $('#idErr').textContent='הזן/י את שמך'; return; } me={role:idRole,name:n}; localStorage.setItem('me',JSON.stringify(me)); updateChip(); hideId(); }
document.querySelectorAll('#idRoles button').forEach(b=> b.onclick=()=>{ idRole=b.dataset.role; document.querySelectorAll('#idRoles button').forEach(x=>x.classList.toggle('on',x===b)); });
$('#idName').onkeydown = e=>{ if(e.key==='Enter') doId(); };
$('#idEnter').onclick = doId;
$('#idChip').onclick = showId;
function setDate(){ $('#dateLine').textContent = new Date().toLocaleDateString('he-IL',{weekday:'long', day:'numeric', month:'long', year:'numeric'}); }
function hhmm(ms){ return ms ? new Date(ms).toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'}) : ''; }

async function api(payload){
  let url=ENDPOINT, opt;
  if(payload){ opt={method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(payload)}; }
  else { opt={method:'GET'}; }
  const res = await fetch(url,opt);
  if(!res.ok) throw new Error('HTTP '+res.status);
  const data = await res.json();
  if(data.error) throw new Error(data.error);
  state = data; return data;
}
async function refresh(){ try{ await api(null); render(); hideBanner(); }catch(e){ showBanner('אין חיבור כרגע — מנסה שוב…'); } }
function bg(payload){ api(payload).then(()=>{ render(); hideBanner(); }).catch(()=>refresh()); }
async function send(payload, ok){ try{ await api(payload); render(); hideBanner(); if(ok) toast(ok); }catch(e){ showBanner('הפעולה לא נשמרה: '+e.message); } }

function roomNum(r){ const m=String(r||'').match(/\d+/); return m?+m[0]:999; }
function ago(ms){ if(!ms) return ''; const m=Math.floor((Date.now()-ms)/60000); if(m<1) return 'עכשיו'; if(m<60) return 'לפני '+m+' ד׳'; return 'לפני '+Math.floor(m/60)+' שע׳'; }
function openReqs(room){ return (state.requests||[]).filter(r=>norm(r.room)===norm(room) && r.status!=='done'); }
function allReqs(room){ return (state.requests||[]).filter(r=>norm(r.room)===norm(room)); }
function norm(s){ return String(s==null?'':s).trim().toLowerCase(); }

function render(){ renderTable(); }

function renderTable(){
  const tb=$('#rows'); tb.innerHTML='';
  const list=(state.patients||[]).slice().sort((a,b)=>roomNum(a.room)-roomNum(b.room));
  $('#empty').classList.toggle('hidden', list.length>0);

  list.forEach(p=>{
    const si=stageIdx(p.discharge);
    const tr=document.createElement('tr');
    if(p.discharge) tr.className='r-'+p.discharge;
    const cell=(j,k)=>`<button class="chk ${k} ${j<=si?'on':''}" data-stage="${k}" data-id="${p.id}" aria-label="שלב">${CHECK}</button>`;
    const open=openReqs(p.room).length;
    const reqCell = open
      ? `<button class="reqbtn" data-req="${p.id}"><span class="badge has"><svg class="ic" viewBox="0 0 24 24"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>${open}</span></button>`
      : `<button class="reqbtn" data-req="${p.id}"><span style="color:var(--ink3)">＋</span></button>`;
    tr.innerHTML=`
      <td class="room">${esc(p.room)||'—'}</td>
      <td class="name">${esc(p.name)||'מטופלת'}${p.diet?`<div class="diet">${esc(p.diet)}</div>`:''}</td>
      <td>${cell(0,'unsigned')}</td>
      <td>${cell(1,'intern')}</td>
      <td>${cell(2,'ready')}</td>
      <td>${reqCell}</td>`;
    tb.appendChild(tr);
    if(expandedId===p.id) tb.appendChild(detailRow(p));
  });

  tb.querySelectorAll('[data-stage]').forEach(b=> b.onclick=()=>{
    const p=state.patients.find(x=>x.id===b.dataset.id); if(!p) return;
    const target=b.dataset.stage;
    const cur=p.discharge, next = (cur===target) ? '' : target;
    p.discharge=next; renderTable();
    bg({action:'patDischarge', id:p.id, discharge:next, by:who()});
  });
  tb.querySelectorAll('[data-req]').forEach(b=> b.onclick=()=>{ expandedId = (expandedId===b.dataset.req)?null:b.dataset.req; renderTable(); });
}

function detailRow(p){
  const tr=document.createElement('tr'); tr.className='detail';
  const reqs=allReqs(p.room).sort((a,b)=>({new:0,progress:1,done:2}[a.status]-{new:0,progress:1,done:2}[b.status]) || (a.createdAtMs-b.createdAtMs));
  const cards = reqs.map(r=>{
    const urgent=r.priority==='urgent'&&r.status!=='done';
    let acts='';
    if(r.status==='new') acts=`<button class="mini take" data-a="reqTake" data-id="${r.id}"><svg class="ic" viewBox="0 0 24 24"><path d="M5 9l4-4 2 2M9 5v8a4 4 0 0 0 8 0v-3"/></svg>אני מטפל/ת</button><button class="mini done" data-a="reqDone" data-id="${r.id}">${CHECK}בוצע</button><button class="mini cancel" data-a="reqRemove" data-id="${r.id}">בטל</button>`;
    else if(r.status==='progress') acts=`<button class="mini done" data-a="reqDone" data-id="${r.id}">${CHECK}בוצע</button><button class="mini reopen" data-a="reqReopen" data-id="${r.id}">↩︎</button>`;
    else acts=`<button class="mini reopen" data-a="reqReopen" data-id="${r.id}">↩︎ החזר</button>`;
    return `<div class="reqcard">
      <span class="tic">${svgIcon(r.type)}</span>
      <div class="body"><div class="ty">${esc(r.type)}</div>${r.detail?`<div class="de">${esc(r.detail)}</div>`:''}<div class="mt">${r.createdBy?'ביקש/ה '+esc(r.createdBy):''}${r.createdAtMs?' · '+hhmm(r.createdAtMs)+' ('+ago(r.createdAtMs)+')':''}${r.takenBy?' · מטפל/ת '+esc(r.takenBy):''}</div><div class="ract">${acts}</div></div>
      <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end">${urgent?'<span class="pill urgent">דחוף</span>':''}<span class="pill s-${r.status}">${STATUS_HE[r.status]}</span></div>
    </div>`;
  }).join('');
  tr.innerHTML=`<td colspan="6"><div class="inner">
    <div class="dh">בקשות סיעוד · חדר ${esc(p.room)} · ${esc(p.name)||'מטופלת'}</div>
    ${cards||'<div style="font-size:13px;color:var(--ink3)">אין בקשות פתוחות</div>'}
    <button class="addreq" data-add="${p.id}"><svg class="ic" viewBox="0 0 24 24" style="width:17px;height:17px"><path d="M12 5v14M5 12h14"/></svg>בקשת סיעוד חדשה</button>
  </div></td>`;
  setTimeout(()=>{
    tr.querySelectorAll('[data-a]').forEach(b=> b.onclick=()=>{
      const a=b.dataset.a, id=b.dataset.id, r=(state.requests||[]).find(x=>x.id===id);
      if(a==='reqRemove'){ if(!confirm('לבטל את הבקשה?')) return; state.requests=state.requests.filter(x=>x.id!==id); renderTable(); bg({action:'reqRemove',id,by:who()}); return; }
      if(r){ if(a==='reqTake'){r.status='progress';r.takenBy=who();} else if(a==='reqDone'){r.status='done';} else if(a==='reqReopen'){r.status='new';r.takenBy='';} renderTable(); }
      bg({action:a,id,by:who()});
    });
    const ab=tr.querySelector('[data-add]'); if(ab) ab.onclick=()=>openNewReq(p.room,p.name);
  },0);
  return tr;
}

let nrType=null, nrUrgent=false, nrRoom='', nrName='';
function openNewReq(room,name){
  nrType=null; nrUrgent=false; nrRoom=room||''; nrName=name||'';
  const typeOpts=TYPES.map(t=>`<button class="opt" data-type="${t}"><span class="oic">${svgIcon(t)}</span>${t}</button>`).join('');
  const ov=document.createElement('div'); ov.className='overlay'; ov.id='nrOverlay';
  ov.innerHTML=`<div class="sheet">
    <div class="grab"></div>
    <h2>בקשת סיעוד חדשה</h2>
    <div class="for">חדר ${esc(nrRoom)} · ${esc(nrName)||'מטופלת'}</div>
    <div class="step">מה צריך מהרופא/ה?</div>
    <div class="grid" id="nrTypes">${typeOpts}</div>
    <div class="step">דחיפות</div>
    <div class="urg"><button class="opt on" id="nrNormal" style="justify-content:center">רגיל</button><button class="opt" id="nrUrgent" style="justify-content:center">דחוף</button></div>
    <div class="step">פרטים / הערה (לא חובה)</div>
    <textarea id="nrDetail" placeholder="לדוגמה: מתלוננת על כאב ראש ולחץ דם 150/95, נא להעריך"></textarea>
    <div class="sheet-acts">
      <button class="btn ghost" id="nrCancel">ביטול</button>
      <button class="btn primary" id="nrSend">${CHECK} שליחה</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  ov.onclick=e=>{ if(e.target===ov) closeNR(); };
  ov.querySelectorAll('[data-type]').forEach(b=> b.onclick=()=>{ ov.querySelectorAll('#nrTypes .opt').forEach(x=>x.classList.remove('on')); b.classList.add('on'); nrType=b.dataset.type; });
  $('#nrNormal').onclick=()=>{ nrUrgent=false; $('#nrNormal').classList.add('on'); $('#nrUrgent').classList.remove('on','urgent'); };
  $('#nrUrgent').onclick=()=>{ nrUrgent=true; $('#nrUrgent').classList.add('on','urgent'); $('#nrNormal').classList.remove('on'); };
  $('#nrCancel').onclick=closeNR; $('#nrSend').onclick=submitNR;
}
function closeNR(){ const o=$('#nrOverlay'); if(o) o.remove(); }
function submitNR(){
  if(!nrType){ toast('בחר/י סוג בקשה'); return; }
  const detail=$('#nrDetail').value.trim(), room=nrRoom, name=nrName, type=nrType, urgent=nrUrgent;
  closeNR();
  state.requests=state.requests||[];
  state.requests.push({id:'tmp'+Date.now(), room, name, type, detail, priority:urgent?'urgent':'normal', status:'new', createdBy:who(), createdAtMs:Date.now(), takenBy:'', doneBy:''});
  expandedId = (state.patients.find(x=>norm(x.room)===norm(room))||{}).id || expandedId;
  renderTable(); toast('הבקשה נשלחה');
  bg({action:'reqAdd', room, name, type, detail, priority:urgent?'urgent':'normal', by:who()});
}

const file=$('#file');
$('#uploadBtn').onclick=()=>file.click();
file.onchange=()=> file.files[0] && handleImage(file.files[0]);
async function handleImage(f){
  const btn=$('#uploadBtn'), orig=btn.innerHTML; btn.innerHTML='<span class="spin"></span> קורא…';
  try{ const {b64,mediaType}=await resize(f); await send({action:'extract', image:b64, mediaType}, 'הרשימה נטענה'); }
  catch(e){ showBanner('קריאת התמונה נכשלה: '+e.message); }
  finally{ btn.innerHTML=orig; file.value=''; }
}
function resize(f){ return new Promise((res,rej)=>{ const img=new Image(); img.onload=()=>{ const max=1600, sc=Math.min(1,max/Math.max(img.width,img.height)); const c=document.createElement('canvas'); c.width=Math.round(img.width*sc); c.height=Math.round(img.height*sc); c.getContext('2d').drawImage(img,0,0,c.width,c.height); const u=c.toDataURL('image/jpeg',0.85); res({b64:u.split(',')[1], mediaType:'image/jpeg'}); }; img.onerror=rej; img.src=URL.createObjectURL(f); }); }
$('#addPatBtn').onclick=()=>{ const room=prompt('מספר חדר/מיטה:'); if(room===null) return; const name=prompt('שם המטופלת:'); if(name===null) return; send({action:'patAdd', room:room.trim(), name:name.trim(), by:who()}); };
$('#newdayBtn').onclick=()=>{ if(confirm('לפתוח יום חדש ולנקות את הלוח? פעולה זו אינה הפיכה.')) send({action:'newday'},'הלוח נוקה'); };

let tT; function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.add('show'); clearTimeout(tT); tT=setTimeout(()=>t.classList.remove('show'),3000); }
function showBanner(m){ const b=$('#banner'); b.textContent=m; b.classList.add('show'); }
function hideBanner(){ $('#banner').classList.remove('show'); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

setDate(); updateChip();
if(me) hideId(); else showId();
setInterval(()=>{ if(!$('#nrOverlay') && $('#idgate').style.display==='none') refresh(); }, POLL_MS);
api(null).then(render).catch(()=>showBanner('אין חיבור לשרת — בדוק/בדקי חיבור.'));
</script>
